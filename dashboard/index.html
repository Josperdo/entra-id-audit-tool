<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entra ID Audit Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div>
    <h1>Entra ID Audit Dashboard</h1>
    <div class="meta">
      Tenant: <span id="meta-tenant">—</span> &middot;
      Generated: <span id="meta-generated">—</span> &middot;
      Tool version: <span id="meta-version">—</span>
    </div>
  </div>
  <div class="controls">
    <label class="file-label" for="file-input">Load Report (JSON)</label>
    <input type="file" id="file-input" accept="application/json" class="visually-hidden">
    <button id="load-sample-btn" class="secondary" type="button">Load Sample Data</button>
    <button id="export-csv-btn" type="button">Export CSV</button>
  </div>
</header>

<main>
  <section class="cards" id="summary-cards" aria-label="Findings summary"></section>

  <section class="panel">
    <div class="panel-header">Findings by Check</div>
    <div class="metrics-grid" id="metrics-grid"></div>
  </section>

  <section class="panel">
    <div class="filters">
      <input type="search" id="search-input" placeholder="Search affected object, title, or description...">
      <select id="severity-filter">
        <option value="">All Severities</option>
        <option value="Critical">Critical</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <select id="check-filter">
        <option value="">All Checks</option>
      </select>
      <button id="clear-filters-btn" type="button">Clear Filters</button>
      <span class="result-count" id="result-count"></span>
    </div>

    <div id="table-wrapper">
      <table id="findings-table">
        <thead>
          <tr>
            <th data-key="severity">Severity</th>
            <th data-key="checkName">Check</th>
            <th data-key="affectedObject">Affected Object</th>
            <th data-key="title">Finding</th>
            <th data-key="detectedAt">Detected</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="findings-tbody"></tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none;">No findings match the current filters.</div>
    </div>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
