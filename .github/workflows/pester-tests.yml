name: Pester Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pester:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester 5
        shell: pwsh
        run: Install-Module Pester -Force -SkipPublisherCheck -MinimumVersion 5.0 -Scope CurrentUser

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0
          $result = Invoke-Pester -Path tests/AuditChecks.Tests.ps1 -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
            throw "$($result.FailedCount) test(s) failed"
          }
